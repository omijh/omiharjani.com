<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Page not found — Omi Harjani">
  <title>404 — Omi Harjani</title>
  <link id="favicon" rel="icon" type="image/svg+xml" sizes="any" href="/assets/favicon-spring.svg">
  <link rel="apple-touch-icon" href="/assets/favicon-spring.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script defer src="/js/analytics.js"></script>
  <style>
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 32px;
    }
    .error-code {
      font-size: clamp(72px, 20vw, 120px);
      font-weight: 800;
      letter-spacing: -2px;
      margin: 0;
      line-height: 1;
    }
    .error-message {
      font-size: 20px;
      color: var(--muted);
      margin: 16px 0 8px;
      max-width: 400px;
    }
    .error-sub {
      font-size: 14px;
      color: var(--muted);
      opacity: 0.6;
      margin: 0 0 8px;
      max-width: 360px;
    }
    .error-dino {
      font-size: 64px;
      line-height: 1;
      margin: 8px 0 16px;
      filter: grayscale(0.3);
      transition: filter 0.3s, transform 0.3s;
      cursor: default;
      user-select: none;
      animation: wobble 3s ease-in-out infinite;
    }
    .error-dino:hover {
      filter: grayscale(0);
      transform: scale(1.1);
    }
    @keyframes wobble {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
  </style>
</head>
<body>
  <main class="error-page">
    <h1 class="error-code">404</h1>
    <div class="error-dino" aria-hidden="true">🦕</div>
    <p class="error-message">That page doesn't exist — or it wandered off somewhere.</p>
    <p class="error-sub">Don't worry, this little dinosaur is equally confused.</p>
    <a class="ghost" href="/">Go home</a>
  </main>
  <script src="/js/theme.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      applySeason(getCurrentSeason());
    });
  </script>
</body>
</html>
